<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CosmosReason2 Video Analysis</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 1rem;
    }

    h1 {
      margin-top: 0;
    }

    h2 {
      font-size: 1rem;
      margin: 0.75rem 0 0.25rem;
    }

    .row {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .col {
      flex: 1;
      min-width: 200px;
    }

    label {
      display: block;
      margin-top: 0.5rem;
      font-weight: 600;
    }

    select,
    input[type="file"],
    input[type="text"],
    input[type="number"],
    button {
      padding: 0.4rem 0.8rem;
      font-size: 1rem;
    }

    input[type="number"] {
      width: 6rem;
    }

    textarea {
      width: 100%;
      min-height: 80px;
      padding: 0.4rem;
      font-family: monospace;
      font-size: 0.9rem;
    }

    button.primary {
      background: #0d6efd;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button.primary:hover {
      background: #0b5ed7;
    }

    button.primary:disabled {
      background: #6c757d;
      cursor: not-allowed;
    }

    #frame {
      max-width: 100%;
      height: auto;
      background: #111;
      display: block;
    }

    #result {
      margin-top: 0.5rem;
      padding: 0.5rem;
      background: #f5f5f5;
      border-radius: 4px;
      min-height: 2rem;
    }

    #caption {
      color: #666;
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    .error {
      color: #c00;
    }

    .success {
      color: #0a0;
    }

    .settings {
      background: #f8f9fa;
      padding: 0.75rem;
      border-radius: 6px;
      margin-top: 0.5rem;
    }

    .settings summary {
      cursor: pointer;
      font-weight: 600;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.5rem 1rem;
      margin-top: 0.5rem;
    }

    .file-input-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>

<body>
  <h1>CosmosReason2 Video Analysis</h1>
  <p>Input: Select from the video folder or upload a file</p>

  <div class="row">
    <div class="col">
      <label>Video source</label>
      <div class="row">
        <select id="videoSelect">
          <option value="">-- Select from the video folder --</option>
        </select>
        <span>or</span>
        <input type="file" id="fileInput" class="file-input-hidden" accept=".mp4,.avi,.mov,.mkv,.webm" />
        <button type="button" id="chooseFileBtn">Choose file…</button>
      </div>
      <p id="uploadedName" style="margin-top:0.25rem;color:#666;display:none;"></p>

      <details class="settings">
        <summary>Hyperparameters & API settings</summary>
        <h2>API Settings</h2>
        <div class="settings-grid">
          <label>Base URL <input type="text" id="apiBaseUrl" style="width:100%;" /></label>
          <label>API Key <input type="password" id="apiKey" style="width:100%;" /></label>
          <label>Model <input type="text" id="model" style="width:100%;" /></label>
        </div>
        <h2>Inference Parameters</h2>
        <div class="settings-grid">
          <label>max_tokens <input type="number" id="maxTokens" min="1" max="4096" /></label>
          <label>temperature <input type="number" id="temperature" min="0" max="2" step="0.01" /></label>
          <label>jpeg_quality <input type="number" id="jpegQuality" min="50" max="100" /></label>
          <label>Request interval (sec) <input type="number" id="requestIntervalSec" min="0.05" max="5"
              step="0.05" /></label>
          <label>Min step duration (sec) <input type="number" id="minStepDurationSec" min="0.5" max="60" step="0.5"
              title="Steps that never persist for at least this many seconds will be flagged" /></label>
        </div>
        <h2>Prompts</h2>
        <label>System prompt <textarea id="systemPrompt" rows="6"></textarea></label>
        <label>User prompt <textarea id="userPrompt" rows="2"></textarea></label>
      </details>

      <button id="startBtn" class="primary" style="margin-top:0.5rem;">Start inference</button>
    </div>
  </div>

  <div style="margin-top:1rem;">
    <img id="frame" alt="Frame" style="display:none;" />
    <p id="caption" class="caption"></p>
    <div id="result"></div>
    <div id="thresholdCheck" style="display:none; margin-top:0.5rem; padding:0.5rem; border-radius:4px;"></div>
  </div>

  <script>
    const videoSelect = document.getElementById('videoSelect');
    const fileInput = document.getElementById('fileInput');
    const chooseFileBtn = document.getElementById('chooseFileBtn');
    const uploadedName = document.getElementById('uploadedName');
    const startBtn = document.getElementById('startBtn');
    const frameImg = document.getElementById('frame');
    const captionEl = document.getElementById('caption');
    const resultEl = document.getElementById('result');
    const apiBaseUrlEl = document.getElementById('apiBaseUrl');
    const apiKeyEl = document.getElementById('apiKey');
    const modelEl = document.getElementById('model');
    const maxTokensEl = document.getElementById('maxTokens');
    const temperatureEl = document.getElementById('temperature');
    const jpegQualityEl = document.getElementById('jpegQuality');
    const requestIntervalSecEl = document.getElementById('requestIntervalSec');
    const systemPromptEl = document.getElementById('systemPrompt');
    const userPromptEl = document.getElementById('userPrompt');
    const minStepDurationSecEl = document.getElementById('minStepDurationSec');
    const thresholdCheckEl = document.getElementById('thresholdCheck');

    let uploadedPath = null;
    var lastVideoPath = null;
    var lastConfig = null;

    async function loadVideos() {
      try {
        const res = await fetch('/api/videos');
        if (!res.ok) throw new Error('API error ' + res.status);
        const data = await res.json();
        videoSelect.innerHTML = '<option value="">-- Select from the video folder --</option>';
        for (const v of data.videos || []) {
          const opt = document.createElement('option');
          opt.value = v.path;
          opt.textContent = v.name;
          videoSelect.appendChild(opt);
        }
      } catch (e) {
        console.error(e);
        resultEl.innerHTML = '<span class="error">Cannot connect to the server. Make sure FastAPI is running. (' + escapeHtml(e.message) + ')</span>';
      }
    }

    async function loadDefaults() {
      try {
        const res = await fetch('/api/defaults');
        if (!res.ok) return;
        const d = await res.json();
        apiBaseUrlEl.value = d.api_base_url || '';
        apiKeyEl.value = d.api_key || '';
        modelEl.value = d.model || '';
        maxTokensEl.value = d.max_tokens ?? 256;
        temperatureEl.value = d.temperature ?? 0.05;
        jpegQualityEl.value = d.jpeg_quality ?? 88;
        requestIntervalSecEl.value = d.request_interval_sec ?? 0.1;
        systemPromptEl.value = d.system_prompt || '';
        userPromptEl.value = d.user_prompt || '';
        if (minStepDurationSecEl) minStepDurationSecEl.value = d.min_step_duration_sec ?? 5;
      } catch (e) {
        console.warn('Defaults load failed', e);
      }
    }

    function showThresholdCheck(stepErrors, minDurationSec) {
      if (!thresholdCheckEl) return;
      const sec = (minDurationSec != null && minDurationSec !== undefined) ? Number(minDurationSec) : 5;
      if (!stepErrors || !Array.isArray(stepErrors)) {
        thresholdCheckEl.style.display = 'none';
        thresholdCheckEl.textContent = '';
        thresholdCheckEl.className = '';
        thresholdCheckEl.style.background = '';
        thresholdCheckEl.style.border = '';
        return;
      }
      thresholdCheckEl.style.display = 'block';
      if (stepErrors.length === 0) {
        thresholdCheckEl.className = 'success';
        thresholdCheckEl.style.background = '#e9f7ef';
        thresholdCheckEl.style.border = '1px solid #0a0';
        thresholdCheckEl.textContent = 'Threshold check: OK (each step observed for ≥ ' + sec + ' sec)';
      } else {
        const labels = stepErrors.map(function (n) { return 'step' + n; }).join(', ');
        thresholdCheckEl.className = 'error';
        thresholdCheckEl.style.background = '#ffdddd';
        thresholdCheckEl.style.border = '1px solid #c00';
        thresholdCheckEl.textContent = 'Threshold check: FAILED (no segment ≥ ' + sec + ' sec) — ' + labels;
      }
    }

    if (chooseFileBtn && fileInput) {
      chooseFileBtn.addEventListener('click', () => {
        fileInput.click();
      });
    }

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        const form = new FormData();
        form.append('file', file);
        const res = await fetch('/api/upload', { method: 'POST', body: form });
        if (!res.ok) throw new Error('Upload failed ' + res.status);
        const data = await res.json();
        uploadedPath = data.path;
        uploadedName.textContent = 'Uploaded: ' + data.name;
        uploadedName.style.display = 'block';
        videoSelect.value = '';
        resultEl.innerHTML = '';
      } catch (err) {
        resultEl.innerHTML = '<span class="error">Upload failed: ' + escapeHtml(err.message) + '</span>';
      }
    });

    videoSelect.addEventListener('change', () => {
      if (videoSelect.value) {
        uploadedName.style.display = 'none';
        uploadedPath = null;
      }
    });

    startBtn.addEventListener('click', () => {
      const path = uploadedPath || videoSelect.value;
      if (!path) {
        resultEl.innerHTML = '<span class="error">Please select a video or upload one.</span>';
        return;
      }
      resultEl.innerHTML = '';
      captionEl.textContent = 'Connecting...';
      startBtn.disabled = true;
      frameImg.style.display = 'block';
      frameImg.src = '';
      showThresholdCheck(null, null);
      lastVideoPath = path;
      lastConfig = null;

      const config = {
        video_path: path,
        api_base_url: apiBaseUrlEl.value.trim(),
        api_key: apiKeyEl.value.trim(),
        model: modelEl.value.trim(),
        max_tokens: parseInt(maxTokensEl.value, 10) || 256,
        temperature: parseFloat(temperatureEl.value) || 0.05,
        jpeg_quality: parseInt(jpegQualityEl.value, 10) || 88,
        request_interval_sec: parseFloat(requestIntervalSecEl.value) || 0.1,
        system_prompt: systemPromptEl.value.trim(),
        user_prompt: userPromptEl.value.trim(),
        min_step_duration_sec: minStepDurationSecEl ? (parseFloat(minStepDurationSecEl.value) || 5) : 5,
      };

      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = protocol + '//' + location.host + '/ws/stream';
      let ws;
      try {
        ws = new WebSocket(wsUrl);
      } catch (err) {
        resultEl.innerHTML = '<span class="error">Failed to create WebSocket connection: ' + escapeHtml(err.message) + '</span>';
        captionEl.textContent = '';
        startBtn.disabled = false;
        return;
      }

      ws.onopen = () => {
        captionEl.textContent = 'Streaming...';
        lastConfig = config;
        ws.send(JSON.stringify(config));
      };

      ws.onmessage = (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'frame') {
          frameImg.src = msg.image;
          captionEl.textContent = 'FPS: ' + (msg.fps || 0).toFixed(1) + '  |  Video time: ' + (msg.video_time_sec || 0).toFixed(2) + 's';
          if (msg.result) {
            if (msg.result.error) {
              resultEl.innerHTML = '<span class="error">' + escapeHtml(msg.result.error) + '</span>';
            } else {
              let html = '<strong>Latency:</strong> ' + (msg.result.latency_ms || 0).toFixed(1) + ' ms<br><pre>' + escapeHtml(msg.result.text || '') + '</pre>';
              if (msg.result.current_action != null && msg.result.current_action !== undefined && msg.result.current_action !== '') {
                html += '<br><strong>Estimated action (most frequent in last 10):</strong> ' + escapeHtml(msg.result.current_action);
                if (msg.result.current_action_count != null && msg.result.current_action_count !== undefined) {
                  html += ' <span style="color:#666;">(' + msg.result.current_action_count + '/10)</span>';
                }
              }
              resultEl.innerHTML = html;
            }
          } else {
            resultEl.innerHTML = '— No result yet —';
          }
        } else if (msg.type === 'done') {
          captionEl.textContent = 'Analysis completed.';
          captionEl.classList.add('success');
          resultEl.innerHTML = 'Done.';
          showThresholdCheck(msg.step_errors || [], msg.min_step_duration_sec);
          ws.close();
        } else if (msg.type === 'error') {
          resultEl.innerHTML = '<span class="error">' + escapeHtml(msg.message || 'Error') + '</span>';
          captionEl.textContent = '';
          ws.close();
        }
      };

      ws.onclose = (ev) => {
        startBtn.disabled = false;
        if (!ev.wasClean && ev.code !== 1000 && captionEl.textContent === 'Connecting...') {
          resultEl.innerHTML = '<span class="error">Connection was closed. Make sure the server (FastAPI) is running and listening on port 8000.</span>';
          captionEl.textContent = '';
        }
      };

      ws.onerror = () => {
        resultEl.innerHTML = '<span class="error">WebSocket error. Cannot connect to the server. Start FastAPI and try again.</span>';
        captionEl.textContent = '';
        startBtn.disabled = false;
      };
    });

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    loadVideos();
    loadDefaults();
  </script>
</body>

</html>
