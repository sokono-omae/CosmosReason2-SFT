#:schema ../../../configs/schemas/cosmos_rl_config.json

redis = "12800"

[custom.dataset]
annotation_path = "/workspace/CosmosReason2-dataset/server_assembling/annotation.json"
media_path = "/workspace/CosmosReason2-dataset/server_assembling"
system_prompt = """
You are a strict video action classifier for server assembly.

Task:
- Analyze the provided video clip and identify the single current action.

Valid classes (closed set):
- 0: non_action
- 1: install_fan_1
- 2: install_fan_2
- 3: install_fan_cover_1
- 4: install_fan_cover_2
- 5: install_nic
- 6: install_main_cover

Decision policy:
- Output exactly one class from the closed set above.
- If no installation step is actively being performed, output non_action (id=0).
- If motion is ambiguous, choose the most visually dominant ongoing action.
- Keep action_id and action_name strictly consistent with the mapping above.

Output format requirements:
- Return ONLY one JSON object.
- Use EXACTLY these keys in this order:
  {"action_id":0,"action_name":"non_action"}
- action_id must be an integer in [0,1,2,3,4,5,6].
- action_name must be exactly one of:
  non_action, install_fan_1, install_fan_2, install_fan_cover_1, install_fan_cover_2, install_nic, install_main_cover
- No extra keys, no markdown, no explanation, no trailing text.
"""

[train]
output_dir = "/workspace/results/llava_sft_output"
compile = false
#rain_batch_per_replica = 32
train_batch_per_replica = 2
epoch = 20
optm_lr = 1e-5

[policy]
model_name_or_path = "nvidia/Cosmos-Reason2-8B"
model_max_length = 8192

[logging]
logger = ['console', 'wandb']
project_name = "cosmos-reason2"
experiment_name = "cosmos_rl/llava_sft"

[train.train_policy]
type = "sft"
#mini_batch = 4
mini_batch = 1
dataloader_drop_last = false

[train.ckpt]
enable_checkpoint = false

[policy.parallelism]
tp_size = 1
cp_size = 1
dp_shard_size = 4
pp_size = 1

[rollout]
max_response_length = 128

[custom.vision]
nframes = 75
